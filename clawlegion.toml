[runtime]
mode = "demo"
config_dir = "config"
org_config = "config/org.toml"

[api]
host = "127.0.0.1"
port = 8080
web_origin = "http://127.0.0.1:3000"

[security]
plugin_mode = "dev"
plugin_signing_required = false
plugin_public_key = ""

[llm]
provider = "mock"
api_key_env = "CLAWLEGION_LLM_API_KEY"

[executor]
kind = "mock"

