name: CI

on:
  push:

permissions:
  contents: read
  actions: write

env:
  CACHE_SCHEMA: 2026-03
  NODE_VERSION: '20'
  PNPM_VERSION: '10'
  PYTHON_VERSION: '3.12'

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      web: ${{ steps.filter.outputs.web }}
      python_sdk: ${{ steps.filter.outputs.python_sdk }}
      release: ${{ steps.filter.outputs.release }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rust:
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'crates/**'
              - '!crates/sdk/python/**'
              - 'plugins/**'
              - 'tests/**'
              - 'scripts/build-plugins.sh'
            web:
              - 'web/**'
            python_sdk:
              - 'crates/sdk/python/**'
            release:
              - '.github/workflows/**'
              - 'packaging/**'
              - 'packages/npm/**'
              - 'scripts/version_sync.py'
              - 'scripts/render_homebrew_formula.py'
              - 'scripts/render_flatpak_manifest.py'
              - 'scripts/build_pages_repos.sh'

  rust:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.release == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: clawlegion-rust-${{ env.CACHE_SCHEMA }}
          shared-key: stable-${{ runner.os }}-workspace
          cache-workspace-crates: 'true'
      - name: Check formatting
        run: cargo fmt --check
      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Run Rust tests
        run: cargo test --workspace --all-targets
      - name: Build plugins
        run: make plugins

  web:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.web == 'true' || needs.changes.outputs.release == 'true'
    env:
      PNPM_STORE_DIR: ~/.pnpm-store
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Configure pnpm store
        run: pnpm config set store-dir "$PNPM_STORE_DIR"
      - uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: clawlegion-pnpm-${{ env.CACHE_SCHEMA }}-${{ runner.os }}-node${{ env.NODE_VERSION }}-pnpm${{ env.PNPM_VERSION }}-${{ hashFiles('web/pnpm-lock.yaml') }}
          restore-keys: |
            clawlegion-pnpm-${{ env.CACHE_SCHEMA }}-${{ runner.os }}-node${{ env.NODE_VERSION }}-pnpm${{ env.PNPM_VERSION }}-
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run lint
        run: pnpm lint
      - name: Run unit tests
        run: pnpm test
      - name: Build frontend
        run: pnpm build

  python-sdk:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.python_sdk == 'true' || needs.changes.outputs.release == 'true'
    defaults:
      run:
        working-directory: crates/sdk/python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: clawlegion-pip-${{ env.CACHE_SCHEMA }}-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-${{ hashFiles('crates/sdk/python/pyproject.toml') }}
          restore-keys: |
            clawlegion-pip-${{ env.CACHE_SCHEMA }}-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-
      - name: Install SDK dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Run ruff
        run: python -m ruff check .
      - name: Run mypy
        run: python -m mypy clawlegion
      - name: Run pytest
        run: python -m pytest
      - name: Build distributions
        run: python -m build

  ci-status:
    runs-on: ubuntu-latest
    needs:
      - changes
      - rust
      - web
      - python-sdk
    if: always()
    steps:
      - name: Enforce overall status
        env:
          RUST_RESULT: ${{ needs.rust.result }}
          WEB_RESULT: ${{ needs.web.result }}
          PYTHON_RESULT: ${{ needs.python-sdk.result }}
        run: |
          for result in "$RUST_RESULT" "$WEB_RESULT" "$PYTHON_RESULT"; do
            if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
              exit 1
            fi
          done

  cache-housekeeping:
    runs-on: ubuntu-latest
    needs: ci-status
    if: always() && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v4
      - name: Delete stale GitHub Actions caches
        env:
          GITHUB_TOKEN: ${{ github.token }}
          CACHE_PREFIXES: |
            clawlegion-rust-
            clawlegion-pnpm-
            clawlegion-pip-
          KEEP_LATEST_PER_PREFIX: '6'
          KEEP_RECENT_DAYS: '21'
        run: node .github/scripts/cache-cleanup.mjs
