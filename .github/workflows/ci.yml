name: CI

on:
  push:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      web: ${{ steps.filter.outputs.web }}
      python_sdk: ${{ steps.filter.outputs.python_sdk }}
      release: ${{ steps.filter.outputs.release }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rust:
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'crates/**'
              - '!crates/sdk/python/**'
              - 'plugins/**'
              - 'tests/**'
              - 'scripts/build-plugins.sh'
            web:
              - 'web/**'
            python_sdk:
              - 'crates/sdk/python/**'
            release:
              - '.github/workflows/**'
              - 'packaging/**'
              - 'packages/npm/**'
              - 'scripts/version_sync.py'
              - 'scripts/render_homebrew_formula.py'
              - 'scripts/render_flatpak_manifest.py'
              - 'scripts/build_pages_repos.sh'

  rust:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.release == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --check
      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Run Rust tests
        run: cargo test --workspace --all-targets
      - name: Build plugins
        run: make plugins

  web:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.web == 'true' || needs.changes.outputs.release == 'true'
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run lint
        run: pnpm lint
      - name: Run unit tests
        run: pnpm test
      - name: Build frontend
        run: pnpm build

  python-sdk:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.python_sdk == 'true' || needs.changes.outputs.release == 'true'
    defaults:
      run:
        working-directory: crates/sdk/python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install SDK dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Run ruff
        run: python -m ruff check .
      - name: Run mypy
        run: python -m mypy clawlegion
      - name: Run pytest
        run: python -m pytest
      - name: Build distributions
        run: python -m build

  ci-status:
    runs-on: ubuntu-latest
    needs:
      - changes
      - rust
      - web
      - python-sdk
    if: always()
    steps:
      - name: Enforce overall status
        env:
          RUST_RESULT: ${{ needs.rust.result }}
          WEB_RESULT: ${{ needs.web.result }}
          PYTHON_RESULT: ${{ needs.python-sdk.result }}
        run: |
          for result in "$RUST_RESULT" "$WEB_RESULT" "$PYTHON_RESULT"; do
            if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
              exit 1
            fi
          done
